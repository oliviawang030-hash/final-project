<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header_place"></div>
    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => document.getElementById('header_place').innerHTML = data);
    </script>

    <div id="nav_place"></div>
    <script>
        fetch('nav.html')
            .then(response => response.text())
            .then(data => document.getElementById('nav_place').innerHTML = data);
    </script>

    <div class="page-space"></div> 

    <article>
        <!--商品區-->
        <section class="left">
            
            <img src="image/cook/plate.jpg"class="item-img" id="productImg">

            <!-- 商品介紹 -->
            <div class="box">
                <div class="title" onclick="toggleReview(this)">
                    <h3>商品介紹</h3>
                    <span class="arrow">></span>
                </div>

                <div class="content">
                    <p>以可愛兔子造型結合精緻陶瓷工藝，打造兼具趣味與美感的餐桌小物。</p>
                    <p>適合盛放點心、水果、甜品等日常餐食，讓擺盤更具吸引力。</p> 
                    <p>簡約柔和的設計風格，為居家用餐增添溫馨氛圍，提升生活儀式感。</p>
                   
                </div>
            </div>
            
            <!-- 評價 -->

            <div class="box">
                <div class="title" onclick="toggleReview(this)">

                    <h3>評價</h3>
                    <span class="arrow">></span>
                </div>

                <div class="content">

                    <!-- 星等 -->
                    <div class="rating">

                        <input type="radio" id="star1" name="rating" value="1">
                        <label for="star1">★</label>

                        <input type="radio" id="star2" name="rating" value="2">
                        <label for="star2">★</label>

                        <input type="radio" id="star3" name="rating" value="3">
                        <label for="star3">★</label>

                        <input type="radio" id="star4" name="rating" value="4">
                        <label for="star4">★</label>

                        <input type="radio" id="star5" name="rating" value="5">
                        <label for="star5">★</label>

                    </div>

                    <!-- 評論 -->
                    <textarea id="comment" placeholder="請輸入評論"></textarea>
                    
                    
                    <button onclick="addReview()">
                        發表評論
                    </button>

                    <!-- 顯示評論 -->
                    <div id="reviewList"></div>

                </div>

            </div>

        </section>


        <!-- 右側 -->
        <section class="right">
            <h2 id="productName">兔子造型陶瓷點心盤</h2>

            <p class="price" id="productPrice">
                NT$250
            </p>

            <!-- 數量鍵 -->
            <div class="quantity">

                <button onclick="minus()">-</button>
            
                <span id="num">1</span>
            
                <button onclick="plus()">+</button>
            
            </div>
            
            
            <div class="btn-group">

                <a href="checkout.html"><button class="checkout" onclick="buyClick()">立即購買</button></a>
    
                <button class="cart" onclick="cartClick()">加入購物車</button>
    
            </div>
        </section>

        <!-- 推薦商品 -->
        <section class="recommend">

            <h3>推薦商品</h3>
            <div class="rec-container">
                <div class="rec-slide rec-fade">
                    <a href="tissue_box.html" class="rec-text">
                        <img src="image/desk/tissue_box.jpg">
                        <div>時尚幾何印花面紙盒</div>
                    </a>
                </div>
        
                <div class="rec-slide rec-fade">
                    <a href="cup.html" class="rec-text">
                        <img src="image/cook/cup.jpg">
                        <div>手作愛心陶瓷馬克杯</div>
                    </a>
                </div>
        
                
                <div class="rec-slide rec-fade">
                    <a href="tableware.html" class="rec-text">
                        <img src="image/cook/tableware.jpg">
                        <div>歐式簡約不鏽鋼餐具套組</div>
                    </a>
                </div>
        
                <div class="rec-slide rec-fade">
                    <a href="rag.html" class="rec-text">
                        <img src="image/cook/rag.jpg">
                        <div>極簡純棉吸水餐桌布</div>
                    </a>
                </div>
        
                <a class="rec-prev" onclick="changeRecSlide(-1)">&#10094;</a>
                <a class="rec-next" onclick="changeRecSlide(1)">&#10095;</a>
        
            </div>
        
            <div class="rec-dot-box">
                <span class="rec-dot" onclick="showRecSlides(1)"></span>
                <span class="rec-dot" onclick="showRecSlides(2)"></span>
                <span class="rec-dot" onclick="showRecSlides(3)"></span>
                <span class="rec-dot" onclick="showRecSlides(4)"></span>
        
            </div>
        
        </section>
    </article>

   
    <div id="footer_place"></div>
    <script>
        fetch('footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer_place').innerHTML = data);
    </script>


    <div>
        <img src="image/icon/arrow.png" id="topBtn">
    </div> 

    <script src="js/script.js"></script>
</body>
</html>
