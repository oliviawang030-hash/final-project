<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 - Le Petite Nook</title>
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/membership.css">
    <style>
        /* 為了防止主內容被固定的 header 和 nav 遮住，加上頂部留白 */
        .membership-wrapper {
            padding-top: 210px; 
            padding-bottom: 60px;
            min-height: 70vh;
        }
    </style>
</head>
<body>

    <div id="header_place"></div>
    <div id="nav_place"></div>

    <div class="membership-wrapper">
        <main id="mainContainer" class="main-container">

            <div id="authBlock">
                <div class="tab-box">
                    <button id="btnTabLogin" class="tab-button active-tab">會員登入</button>
                    <button id="btnTabRegister" class="tab-button">加入會員</button>
                </div>

                <div id="viewLogin">
                    <div class="form-group">
                        <label>手機號碼</label>
                        <input type="text" id="inputLogPhone" placeholder="請輸入手機號碼">
                    </div>
                    <div class="form-group">
                        <label>密碼</label>
                        <input type="password" id="inputLogPassword" placeholder="請輸入密碼">
                    </div>
                    <button id="btnLoginSubmit" class="action-button">登入</button>
                </div>

                <div id="viewRegister" style="display: none;">
                    <div class="form-group">
                        <label>手機號碼</label>
                        <input id="inputRegPhone" type="text" placeholder="請輸入手機號碼">
                    </div>
                    <div class="form-group">
                        <label>設定密碼</label>
                        <input id="inputRegPassword" type="password" placeholder="請設定密碼">
                    </div>
                    <button id="btnNextStep" class="action-button">下一步</button>
                </div>

                <div id="viewProfile" style="display: none;">
                    <div class="form-group">
                        <label>姓名</label>
                        <input id="inputRegName" type="text" placeholder="請輸入姓名">
                    </div>
                    <div class="form-group">
                        <label>出生日期</label>
                        <input id="inputRegDob" type="text" placeholder="YYYY / MM / DD">
                    </div>
                    <button id="btnRegisterSubmit" class="action-button">完成註冊並送出</button>
                </div>
            </div>

            <div id="memberBlock" style="display: none;">
                <div class="member-menu">
                    <span id="menuInfo" class="active-menu">個人資料</span>
                    <span id="menuOrders">消費紀錄</span>
                    <span id="menuReviews">評論記錄</span>
                </div>

                <div id="subViewInfo" class="info-display-box">
                    <div class="info-item"><strong>姓名：</strong><span id="showName">未填寫</span></div>
                    <div class="info-item"><strong>手機號碼：</strong><span id="showPhone">未填寫</span></div>
                    <div class="info-item"><strong>生日：</strong><span id="showDob">未填寫</span></div>
                    <div class="info-item"><strong>密碼：</strong><span id="showPassword">未填寫</span></div>
                    <button id="btnLogout" class="action-button logout-btn">登出帳號</button>
                </div>

                <div id="subViewOrders" class="info-display-box" style="display: none;">
                    <div class="info-item">暫無消費紀錄</div>
                </div>

                <div id="subViewReviews" class="info-display-box" style="display: none;">
                    </div>
            </div>

        </main>
    </div>

    <div id="footer_place"></div>

    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                // 自動過濾掉檔案中多餘的 html/body 外殼，只留下實際的組件
                const parser = new DOMParser();
                const doc = parser.parseFromString(data, 'text/html');
                const headerContent = doc.querySelector('header');
                document.getElementById('header_place').innerHTML = headerContent ? headerContent.outerHTML : data;
            });

        fetch('nav.html')
            .then(response => response.text())
            .then(data => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data, 'text/html');
                const navContent = doc.querySelector('nav');
                document.getElementById('nav_place').innerHTML = navContent ? navContent.outerHTML : data;
            });

        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data, 'text/html');
                const footerContent = doc.querySelector('footer');
                document.getElementById('footer_place').innerHTML = footerContent ? footerContent.outerHTML : data;
            });
    </script>

    <script src="js/membership.js"></script>
</body>
</html>
